# zsh-anywhere configuration
#
# Tips:
# 1) Copy this file and pass it through --config to keep your own profile.
# 2) true/false options also support: 1/0, yes/no, on/off.
# 3) Third-party plugin format:
#      "plugin_name|global_git_url|cn_git_url"
#    - cn_git_url can be empty, then global_git_url will be used as fallback.

# Mirror strategy: cn or global
MIRROR_MODE="cn"

# Non-interactive mode (auto answer yes to prompts)
AUTO_CONFIRM="false"

# If zsh is missing, try to install it automatically
INSTALL_ZSH_IF_MISSING="true"

# Update existing oh-my-zsh/plugins repos with git pull
UPDATE_EXISTING_REPOS="true"

# Ask whether to set zsh as default shell
SET_DEFAULT_SHELL_PROMPT="true"

# Oh My Zsh repositories
OH_MY_ZSH_REPO_GLOBAL="https://github.com/ohmyzsh/ohmyzsh.git"
OH_MY_ZSH_REPO_CN="https://gitee.com/mirrors/oh-my-zsh.git"

# zsh source package URL (used when package-manager install is unavailable)
ZSH_SOURCE_URL_GLOBAL="https://sourceforge.net/projects/zsh/files/latest/download"
ZSH_SOURCE_URL_CN="https://sourceforge.net/projects/zsh/files/latest/download"

# Theme used in generated ~/.zshrc
# You can choose any theme in ~/.oh-my-zsh/themes, e.g. robbyrussell, agnoster, bira
ZSH_THEME="robbyrussell"

# Built-in oh-my-zsh plugins
# Example: (git sudo docker kubectl)
OMZ_PLUGINS=(git)

# Third-party plugins to install under ~/.oh-my-zsh/custom/plugins
THIRD_PARTY_PLUGINS=(
  "zsh-autosuggestions|https://github.com/zsh-users/zsh-autosuggestions.git|https://gitee.com/mirrors/zsh-autosuggestions.git"
  "zsh-syntax-highlighting|https://github.com/zsh-users/zsh-syntax-highlighting.git|"
)

# zshrc template and output path
# Keep placeholders in template:
#   __ZSH_THEME__
#   __ZSH_PLUGINS__
ZSHRC_TEMPLATE="$SCRIPT_DIR/configs/.zshrc"
ZSHRC_TARGET="$HOME/.zshrc"
